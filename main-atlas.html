*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
.app{font-family:var(--font-sans);color:var(--color-text-primary);font-size:14px;line-height:1.5;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}

.app-title{font-size:15px;font-weight:500}
.app-body{display:grid;grid-template-columns:190px minmax(0,1fr);min-height:580px}
.sidebar{border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.sb-lbl{font-size:10px;font-weight:500;color:var(--color-text-secondary);padding:12px 12px 6px;letter-spacing:.07em;text-transform:uppercase}
.loc-btn{display:block;width:100%;text-align:left;padding:8px 12px;border:none;background:none;cursor:pointer;font-family:var(--font-sans);color:var(--color-text-primary);border-left:2px solid transparent}
.loc-btn:hover{background:var(--color-background-primary)}
.loc-btn.active{background:var(--color-background-primary);border-left-color:var(--color-text-primary)}
.loc-city{display:block;font-size:13px;font-weight:500}
.loc-ctry{display:block;font-size:11px;color:var(--color-text-secondary)}
.add-btn-sb{display:block;width:100%;text-align:left;padding:8px 12px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--color-text-secondary);font-family:var(--font-sans);margin-top:4px}
.add-btn-sb:hover{color:var(--color-text-primary)}
.main{overflow:hidden;min-width:0;background:var(--color-background-primary)}
.hero{padding:20px 20px 0}
.loc-name{font-family:var(--font-serif);font-size:26px;font-weight:400;line-height:1.2;margin-bottom:2px}
.loc-meta{font-size:12px;color:var(--color-text-secondary);margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.tag.g{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
.tag.w{background:var(--color-background-warning);color:var(--color-text-warning);border-color:transparent}
.desc{font-size:13px;color:var(--color-text-secondary);line-height:1.65;margin-bottom:10px;max-width:680px}

.hl{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.tab-nav{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 20px;overflow-x:auto}
.tab-btn{padding:8px 12px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);font-family:var(--font-sans);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:var(--color-text-primary)}
.tab-btn.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab-body{padding:18px 20px}
.chart-wrap{position:relative;width:100%;height:210px;margin-bottom:18px}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)}

.dt{width:100%;border-collapse:collapse;font-size:12px;min-width:860px}
.dt th{text-align:left;padding:7px 10px;font-weight:500;font-size:10px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;letter-spacing:.05em;text-transform:uppercase;background:var(--color-background-secondary)}
.dt td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;vertical-align:middle}

.tc-name{font-size:13px;font-weight:500;margin-bottom:4px}
.tc-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.pc{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px}
.pt{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:8px}
.pv{font-size:14px;font-weight:500;margin-bottom:4px}

.alert-box{padding:10px 12px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-warning);background:var(--color-background-warning);color:var(--color-text-warning);font-size:12px;line-height:1.55;margin-bottom:10px;max-width:640px}

let S={loc:'tirana',tab:'climate',filter:null,chart:null};
const gl=()=>DB.find(l=>l.id===S.loc);
const clbls=['','Budget','Low','Mid','High','Peak'];
const bclr=v=>v<=2?'#639922':v<=4?'#97C459':v<=6?'#C9973A':v<=8?'#EF9F27':v<=9?'#D85A30':'#A32D2D';
const blbl=v=>v<=2?'Quiet':v<=4?'Low':v<=6?'Moderate':v<=8?'Busy':v<=9?'Very busy':'Peak';
const cpc=v=>`pill p${v}`;

function rSidebar(){
  document.getElementById('loc-list').innerHTML=DB.map(l=>`
    <button class="loc-btn ${l.id===S.loc?'active':''}" onclick="selLoc('${l.id}')">
      <span class="loc-city">${l.city}</span>
      <span class="loc-ctry">${l.country}</span>
    </button>`).join('');
}

function rMain(){
  const L=gl();
  document.getElementById('main').innerHTML=`
    <div class="hero">
      <div class="loc-name">${L.city}</div>
      <div class="loc-meta">${L.country} &middot; ${L.region}</div>
      <div class="tags">
        ${L.prac.directGW?'<span class="tag g">✓ Direct from Gatwick</span>':'<span class="tag w">✗ No direct Gatwick flight</span>'}
        <span class="tag">${L.prac.visa}</span>
        <span class="tag">${L.prac.currency}</span>
      </div>
      <div class="desc">${L.desc}</div>
      <div class="hls">${L.hls.map(h=>`<span class="hl">◆ ${h}</span>`).join('')}</div>
    </div>
    <div class="tab-nav">
      ${[['climate','Climate'],['costs','Costs & flights'],['todo','Things to do'],['prac','Practical info']].map(([id,lbl])=>`
        <button class="tab-btn ${id===S.tab?'active':''}" onclick="swTab('${id}')">${lbl}</button>`).join('')}
    </div>
    <div class="tab-body" id="tab-body">${rTab()}</div>`;
  if(S.tab==='climate')initChart();
}

function rTab(){
  const L=gl();
  if(S.tab==='climate')return rClimate(L);
  if(S.tab==='costs')return rCosts(L);
  if(S.tab==='todo')return rTodo(L);
  if(S.tab==='prac')return rPrac(L);
  return '';
}

function rClimate(L){
  const filters=[
    {id:'warm',lbl:'Warmest',fn:d=>d.avg>=20},
    {id:'sunny',lbl:'Sunniest',fn:d=>d.sun>=7},
    {id:'dry',lbl:'Driest',fn:d=>d.rain<35},
    {id:'cheap',lbl:'Cheapest',fn:d=>d.ac<=2&&d.fl<=2},
    {id:'quiet',lbl:'Quietest',fn:d=>d.busy<=3},
  ];
  const af=filters.find(f=>f.id===S.filter);
  return`
    <div class="legend">
      <span class="lg-item"><span class="lg-dot" style="background:#D85A30"></span>High</span>
      <span class="lg-item"><span class="lg-dot" style="background:#C9973A"></span>Average</span>
      <span class="lg-item"><span class="lg-dot" style="background:#378ADD"></span>Low</span>
    </div>
    <div class="chart-wrap"><canvas id="tc" role="img" aria-label="Monthly temperature chart for ${L.city}.">${L.city} monthly temperatures.</canvas></div>
    <div class="filter-row">
      <span class="fl-lbl">Highlight months:</span>
      ${filters.map(f=>`<button class="fb ${S.filter===f.id?'act':''}" onclick="setF('${f.id}')">${f.lbl}</button>`).join('')}
      ${S.filter?`<button class="fb act" onclick="setF(null)">✕ Clear</button>`:''}
    </div>
    <div class="tscroll">
      <table class="dt">
        <thead><tr>
          <th>Month</th><th>Avg °C</th><th>High °C</th><th>Low °C</th>
          <th>Sun hrs/day</th><th>Cloud cover</th><th>Rainfall mm</th>
          <th>Sunrise</th><th>Sunset</th><th>Busyness</th>
        </tr></thead>
        <tbody>${L.months.map(d=>{
          const h=af&&af.fn(d)?'hi-row':'';
          const bc=bclr(d.busy);
          return`<tr class="${h}">
            <td style="font-weight:500">${d.m}</td>
            <td>${d.avg}°</td>
            <td style="color:#D85A30;font-weight:500">${d.hi}°</td>
            <td style="color:#378ADD">${d.lo}°</td>
            <td>${d.sun.toFixed(1)}</td>
            <td><div style="display:flex;align-items:center;gap:6px"><div style="width:44px;height:5px;border-radius:3px;background:var(--color-border-tertiary);overflow:hidden"><div style="width:${d.cld}%;height:100%;background:#B4B2A9;border-radius:3px"></div></div><span>${d.cld}%</span></div></td>
            <td>${d.rain}</td>
            <td style="font-size:11px;font-variant-numeric:tabular-nums">${d.rise}</td>
            <td style="font-size:11px;font-variant-numeric:tabular-nums">${d.set}</td>
            <td><div style="display:flex;align-items:center;gap:6px"><div style="display:flex;gap:1px">${Array.from({length:10}).map((_,i)=>`<div style="width:5px;height:10px;border-radius:1px;background:${i<d.busy?bc:'var(--color-border-tertiary)'}"></div>`).join('')}</div><span style="font-size:11px;color:var(--color-text-secondary)">${blbl(d.busy)}</span></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

function rCosts(L){
  return`
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:14px;max-width:600px;line-height:1.6">Cost ratings reflect relative pricing within the year. <span style="font-weight:500;color:var(--color-text-primary)">Budget</span> = cheapest months; <span style="font-weight:500;color:var(--color-text-primary)">Peak</span> = most expensive.</p>
    <div class="tscroll">
      <table class="dt" style="min-width:auto">
        <thead><tr><th>Month</th><th>Accommodation</th><th>Flights from UK</th><th>Overall</th><th>Busyness</th></tr></thead>
        <tbody>${L.months.map(d=>{
          const ov=Math.round((d.ac+d.fl)/2);
          const bc=bclr(d.busy);
          return`<tr>
            <td style="font-weight:500">${d.m}</td>
            <td><span class="${cpc(d.ac)}">${clbls[d.ac]}</span></td>
            <td><span class="${cpc(d.fl)}">${clbls[d.fl]}</span></td>
            <td><span class="${cpc(ov)}">${clbls[ov]}</span></td>
            <td><div style="display:flex;align-items:center;gap:5px"><div style="display:flex;gap:1px">${Array.from({length:10}).map((_,i)=>`<div style="width:5px;height:10px;border-radius:1px;background:${i<d.busy?bc:'var(--color-border-tertiary)'}"></div>`).join('')}</div><span style="font-size:11px;color:var(--color-text-secondary)">${blbl(d.busy)}</span></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
    <div class="hl-tip"><span style="font-weight:500;color:var(--color-text-primary)">Sweet spot:</span> ${L.sweet}</div>`;
}

function rTodo(L){
  return`<div class="todo-grid">${L.todo.map(t=>`
    <div class="tc">
      <div class="tc-cat">${t.cat}</div>
      <div class="tc-name">${t.name}</div>
      <div class="tc-desc">${t.desc}</div>
    </div>`).join('')}</div>`;
}

function rPrac(L){
  const p=L.prac;
  return`
    ${p.alerts.map(a=>`<div class="alert-box">⚠ ${a}</div>`).join('')}
    <div class="pgrid">
      <div class="pc">
        <div class="pt">WiFi &amp; remote work</div>
        <div style="display:flex;gap:3px;margin-bottom:6px">${Array.from({length:5}).map((_,i)=>`<div style="width:11px;height:11px;border-radius:50%;background:${i<p.wifi.r?'#639922':'var(--color-border-tertiary)'}"></div>`).join('')}</div>
        <div class="pv">${p.wifi.spd}</div>
        <div class="pn">${p.wifi.note}</div>
      </div>
      <div class="pc">
        <div class="pt">Flights from Gatwick</div>
        <div class="pv" style="color:${p.directGW?'var(--color-text-success)':'var(--color-text-warning)'}">${p.directGW?'✓ Direct flights available':'✗ No direct flights'}</div>
        <div class="pn" style="margin-top:5px">${p.fltNote}</div>
      </div>
      <div class="pc">
        <div class="pt">Nearest airports</div>
        ${p.airports.map(a=>`<div class="ar">
          <div><span style="font-weight:500">${a.name}</span> <span style="font-size:11px;color:var(--color-text-secondary)">(${a.code}) · ${a.km} km</span></div>
          ${a.dgw?'<span class="dbadge">Direct LGW</span>':''}
        </div>`).join('')}
      </div>
      <div class="pc">
        <div class="pt">Entry &amp; essentials</div>
        <div class="ir"><span class="il">Visa</span><span style="text-align:right;max-width:60%">${p.visa}</span></div>
        <div class="ir"><span class="il">Currency</span><span style="text-align:right;max-width:60%">${p.currency}</span></div>
        <div class="ir"><span class="il">Language</span><span>${p.lang}</span></div>
        <div class="ir"><span class="il">Timezone</span><span>${p.tz}</span></div>
      </div>
      <div class="pc">
        <div class="pt">Best suited for</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">${p.bestFor.map(b=>`<span class="tag">${b}</span>`).join('')}</div>
      </div>
    </div>`;
}

function initChart(){
  const L=gl();
  const c=document.getElementById('tc');
  if(!c)return;
  if(S.chart){S.chart.destroy();S.chart=null;}
  const dark=matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)';
  const tc=dark?'#888780':'#888780';
  S.chart=new Chart(c,{
    type:'line',
    data:{
      labels:L.months.map(m=>m.m),
      datasets:[
        {label:'High',data:L.months.map(m=>m.hi),borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,0.08)',fill:true,tension:.4,borderWidth:2,pointRadius:3,pointHoverRadius:5},
        {label:'Avg', data:L.months.map(m=>m.avg),borderColor:'#C9973A',backgroundColor:'transparent',tension:.4,borderWidth:2,pointRadius:3,borderDash:[5,3]},
        {label:'Low', data:L.months.map(m=>m.lo),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',fill:true,tension:.4,borderWidth:2,pointRadius:3,pointHoverRadius:5},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.raw}°C`}}},
      scales:{
        x:{grid:{color:gc},ticks:{color:tc,font:{size:11},autoSkip:false},border:{color:gc}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>v+'°C'},border:{color:gc},title:{display:true,text:'Temperature (°C)',color:tc,font:{size:11}}},
      }
    }
  });
}

function selLoc(id){S.loc=id;S.filter=null;S.tab='climate';rSidebar();rMain();}
function swTab(t){
  S.tab=t;S.filter=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-body').innerHTML=rTab();
  if(S.tab==='climate')initChart();
}
function setF(f){S.filter=f;document.getElementById('tab-body').innerHTML=rClimate(gl());initChart();}
function addLoc(){sendPrompt('Please add a new destination to the holiday atlas. The location I want to add is:');}

rSidebar();rMain();
</script>
