name: Regenerate climate data (one-time)

on:
  workflow_dispatch: # manual only; no schedule

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug environment and repository layout
        shell: bash
        run: |
          set -euxo pipefail
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "RUNNER_WORKSPACE=${RUNNER_WORKSPACE:-}"
          pwd
          python --version
          which python
          ls -la
          ls -la .github/workflows || true
          ls -la scripts || true
          ls -la data/locations | sed -n '1,120p' || true
          test -f scripts/regenerate_months_from_meteostat.py
          test -f scripts/validate_locations.py
          test -f data/locations/index.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install meteostat astral pandas

      - name: Regenerate month data from Meteostat
        shell: bash
        run: |
          set -euxo pipefail
          python -m py_compile scripts/regenerate_months_from_meteostat.py scripts/validate_locations.py
          python scripts/regenerate_months_from_meteostat.py --repo-root "$GITHUB_WORKSPACE" --all-locations

      - name: Validate location data
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/validate_locations.py --repo-root "$GITHUB_WORKSPACE"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/meteostat-regeneration
          commit-message: Regenerate monthly climate from Meteostat
          title: Regenerate monthly climate data from Meteostat
          body: |
            One-time GitHub Actions run that regenerates monthly climate fields
            for the 45 location files using Meteostat.
