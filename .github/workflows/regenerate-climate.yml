name: Regenerate climate data (one-time)

on:
  workflow_dispatch:   # manual only; no schedule

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug repository layout
        run: |
          pwd
          ls -la
          ls -la scripts || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meteostat astral pandas

      - name: Regenerate month data from Meteostat
        run: |
          test -f scripts/regenerate_months_from_meteostat.py
          python scripts/regenerate_months_from_meteostat.py --all-locations

      - name: Validate location data
        run: |
          python scripts/validate_locations.py

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/meteostat-regeneration
          commit-message: Regenerate monthly climate from Meteostat
          title: Regenerate monthly climate data from Meteostat
          body: |
            One-time GitHub Actions run that regenerates monthly climate fields
            for the 45 newly added location files using Meteostat.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meteostat geopy timezonefinder astral pandas

      - name: Generate location months
        run: |
          python scripts/regenerate_months_from_meteostat.py

      - name: Validate JSON
        run: |
          python scripts/validate_locations.py

      - name: Open PR with changes
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/meteostat-regeneration
          commit-message: "Regenerate location monthly climate using Meteostat"
          title: "Regenerate monthly climate data from Meteostat"
          body: "One-time Meteostat regeneration for location climate blocks."
