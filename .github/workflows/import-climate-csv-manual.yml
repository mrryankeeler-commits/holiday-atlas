name: Import climate CSV (GitHub Web friendly)

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: "CSV file path in repo (example: data/climate/uploads/batch.csv)"
        required: true
        default: "data/climate/uploads/batch.csv"
      mode:
        description: "How to handle unknown locations"
        required: true
        type: choice
        options:
          - stage
          - create
        default: stage
      fuzzy_cutoff:
        description: "Misspelling tolerance (0-1). Lower = more forgiving."
        required: true
        default: "0.84"

permissions:
  contents: write
  pull-requests: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify importer and validator syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/import_climate_csv.py scripts/validate_locations.py

      - name: Import mixed climate CSV
        shell: bash
        env:
          CSV_PATH: ${{ inputs.csv_path }}
          MODE: ${{ inputs.mode }}
          FUZZY_CUTOFF: ${{ inputs.fuzzy_cutoff }}
        run: |
          set -euo pipefail
          if [ ! -f "$CSV_PATH" ]; then
            echo "CSV not found: $CSV_PATH" >&2
            exit 1
          fi

          COMMON_ARGS=(
            --input-file "$CSV_PATH"
            --location-col "Location"
            --month-col "Month"
            --avg-col "Avg Temp (°C)"
            --hi-col "Avg High (°C)"
            --lo-col "Avg Low (°C)"
            --daylight-col "Daylight (h/day)"
            --cloud-col "Cloud Cover (%)"
            --rain-col "Rainfall (mm)"
            --fuzzy-cutoff "$FUZZY_CUTOFF"
          )

          if [ -f "data/climate/aliases.json" ]; then
            COMMON_ARGS+=(--aliases-file "data/climate/aliases.json")
          fi

          if [ "$MODE" = "create" ]; then
            python scripts/import_climate_csv.py "${COMMON_ARGS[@]}" --create-missing
          else
            python scripts/import_climate_csv.py "${COMMON_ARGS[@]}" --stage-unknown-dir data/pending-locations
          fi

      - name: Validate location data
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_locations.py

      - name: Detect changes
        id: detect_changes
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            git diff --name-only >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git status --short
            git diff --name-only
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request with imports
        id: create_pr
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/import-climate-csv
          commit-message: Import climate CSV updates
          title: Import climate updates from uploaded CSV
          body: |
            Automated import run from `.github/workflows/import-climate-csv.yml`.

            - Source CSV: `${{ inputs.csv_path }}`
            - Mode: `${{ inputs.mode }}`
            - Uses alias map when present at `data/climate/aliases.json`

      - name: Write run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.detect_changes.outputs.has_changes }}" = "true" ]; then
            echo "### ✅ Climate import changed files" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "A pull request was created: ${{ steps.create_pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- \`$line\`" >> "$GITHUB_STEP_SUMMARY"
            done << 'EOF'
${{ steps.detect_changes.outputs.changed_files }}
EOF
          else
            echo "### ℹ️ Climate import produced no data changes" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No files were modified by this run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: No-op summary
        if: steps.detect_changes.outputs.has_changes != 'true'
        run: echo "No changes were generated by the CSV import."
