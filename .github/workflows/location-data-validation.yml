name: Location data validation

on:
  pull_request:
    paths:
      - "data/locations/**"
      - "scripts/validate_locations.py"
      - "scripts/audit_locations.py"
      - "scripts/verify_climate_provenance.py"
      - "scripts/import_climate_csv.py"
      - "Makefile"
      - ".pre-commit-config.yaml"
      - ".github/workflows/location-data-validation.yml"
      - ".github/pull_request_template.md"
      - "README.md"
  workflow_dispatch:

jobs:
  validate-locations:
    name: Validate location payload contract + provenance audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require QA checklist link for location JSON changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request payload found; skipping checklist enforcement.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const touchesLocationJson = files.some((file) =>
              /^data\/locations\/[^/]+\.json$/.test(file.filename)
            );

            if (!touchesLocationJson) {
              core.info('No data/locations/*.json files changed; checklist link not required.');
              return;
            }

            const body = pr.body || '';
            const missing = [];

            if (!/docs\/location-qa-checklists\/[\w.-]+\.md/.test(body)) {
              missing.push('at least one checklist link under docs/location-qa-checklists/*.md');
            }
            if (!/author confirmation/i.test(body)) {
              missing.push('an "Author confirmation" entry');
            }
            if (!/reviewer confirmation/i.test(body)) {
              missing.push('a "Reviewer confirmation" entry');
            }
            if (!/audit script output snippet/i.test(body)) {
              missing.push('an "Audit script output snippet" section');
            }

            if (missing.length) {
              core.setFailed(
                `PR touches data/locations/*.json but is missing required QA section content: ${missing.join(', ')}`
              );
              return;
            }

            core.info('Checklist + QA PR section detected for location JSON changes.');

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run consolidated location audit (fail on high severity)
        run: |
          set -euo pipefail
          python3 scripts/audit_locations.py --fail-on-high

      - name: Emit medium-severity warnings
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from datetime import date
          from pathlib import Path

          report_path = Path(f"reports/location-audit-{date.today().isoformat()}.json")
          if not report_path.exists():
              raise SystemExit(f"Report not found: {report_path}")

          report = json.loads(report_path.read_text(encoding="utf-8"))
          medium_count = 0
          for issue in report.get("issues", []):
              if issue.get("severity") != "medium":
                  continue
              medium_count += 1
              print(
                  f"::warning file={issue.get('file')}::{issue.get('issueCode')}: {issue.get('message')}"
              )
          print(f"medium_warnings={medium_count}")
          PY
